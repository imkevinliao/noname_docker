name: noname_docker

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Docker
    steps:
      - name: copy_from_noname
        uses: actions/checkout@v4
        with:
          repository: libnoname/noname
          ref: main

      - name: Get current date
        id: date
        run: |
          echo "today=$(date -d '8 hours' +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: docker-login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/core/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            kevinstarry/noname:latest
            kevinstarry/noname:${{ steps.date.outputs.today }}
